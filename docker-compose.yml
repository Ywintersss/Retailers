version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: franchise_user
      POSTGRES_PASSWORD: franchise_pass
      POSTGRES_DB: franchiseiq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "franchise_user", "-d", "franchiseiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports:
      - "9092:9092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080" # Exposed on http://localhost:8081
    environment:
      KAFKA_CLUSTERS_0_NAME: Retailers-Cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/franchiseiq
      SPRING_DATASOURCE_USERNAME: franchise_user
      SPRING_DATASOURCE_PASSWORD: franchise_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  frontend:
      build:
        context: ./retailer-dashboard
        dockerfile: Dockerfile
      ports:
        # Map back to Vite's native port
        - "5173:5173"
      volumes:
        # Mount your local source code into the container so edits trigger HMR
        - ./retailer-dashboard:/app
        # Prevent your local node_modules from overwriting the container's node_modules
        - /app/node_modules
      depends_on:
      - backend