version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: franchise_user
      POSTGRES_PASSWORD: franchise_pass
      POSTGRES_DB: franchiseiq
    ports:
      - "5432:5432"
    volumes:
      # Persist database data locally
      - postgres_data:/var/lib/postgresql/data
      # Mount your SQL file for one-time initialization
      # Update './data.sql' if your file is located inside the backend folder
      - ./backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/data.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "franchise_user", "-d", "franchiseiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      # Persist Kafka messages locally
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: Retailers-Cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/franchiseiq
      SPRING_DATASOURCE_USERNAME: franchise_user
      SPRING_DATASOURCE_PASSWORD: franchise_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ILMU_AI_API_KEY: ${ILMU_AI_API_KEY}

  frontend:
    build:
      context: ./retailer-dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./retailer-dashboard:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  kafka_data: