name: Build and Deploy Application

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'mixue-branch-dashboard/**'
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/frontend:latest
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/backend:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./retailer-dashboard
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Add your SQL file path here, separated by a comma
          source: "docker-compose.yml,backend\\src\\main\\resources\\data.sql" 
          target: "/home/${{ secrets.EC2_USERNAME }}/app"
          # Optional: Use strip_components to flatten the directory structure 
          # on the EC2 instance if data.sql is deep inside your repo folder

      - name: Generate .env and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Pass the job env variables into the SSH session
          envs: ILMU_AI_API_KEY, FRONTEND_IMAGE, BACKEND_IMAGE
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/app
            
            echo "ILMU_AI_API_KEY=${{ secrets.ILMU_AI_API_KEY }}" > .env
            echo "FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}" >> .env
            echo "BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}" >> .env
            
            docker compose pull
            # Add these flags to ensure a clean slate
            docker compose up -d --force-recreate --remove-orphans