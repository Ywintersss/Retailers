name: Build and Deploy Application

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'mixue-branch-dashboard/**'
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/frontend:latest
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/backend:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./retailer-dashboard
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,backend/src/main/resources/schema.sql,backend/src/main/resources/data.sql" 
          target: "/home/${{ secrets.EC2_USERNAME }}/app"

      - name: Generate .env and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ILMU_AI_API_KEY, FRONTEND_IMAGE, BACKEND_IMAGE
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/app
            
            echo "ILMU_AI_API_KEY=${{ secrets.ILMU_AI_API_KEY }}" > .env
            echo "OPEN_WEATHER_API_KEY=${{ secrets.OPEN_WEATHER_API_KEY }}" >> .env
            echo "FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}" >> .env
            echo "BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}" >> .env
            echo "VITE_API_BASE_URL=http://localhost:8080" >> .env
            echo "VITE_API_BASE_URL_PROD=https://retailers.webhop.me" >> .env
            echo "VITE_IS_PROD=true" >> .env
                        
            docker compose pull
            
            echo "Starting infrastructure containers..."
            docker compose up -d --force-recreate --remove-orphans postgres kafka
            
            echo "Waiting for PostgreSQL to accept connections..."
            until docker exec $(docker compose ps -q postgres) pg_isready -U franchise_user -d franchiseiq; do
              sleep 2
            done
            
            echo "Executing schema migration..."
            docker exec $(docker compose ps -q postgres) psql -v ON_ERROR_STOP=1 -U franchise_user -d franchiseiq -f /scripts/schema.sql
            
            echo "Executing data seed..."
            docker exec $(docker compose ps -q postgres) psql -v ON_ERROR_STOP=1 -U franchise_user -d franchiseiq -f /scripts/data.sql
            
            echo "Starting application containers..."
            docker compose up -d